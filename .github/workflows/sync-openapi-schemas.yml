name: Sync OpenAPI Schemas

on:
  schedule:
    - cron: '0 3 * * 1' # Every Monday at 03:00 UTC = 12:00 JST
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync-schemas:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Fetch latest OpenAPI schemas
        run: bun run fetch:schemas

      - name: Check for schema changes
        id: changes
        run: |
          if git diff --quiet openapi/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No schema changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Schema changes detected:"
            git diff --stat openapi/
          fi

      - name: Close existing sync PRs
        if: steps.changes.outputs.changed == 'true'
        run: |
          EXISTING_PRS=$(gh pr list --head "chore/sync-openapi-schemas" --json number --jq '.[].number' || true)
          for PR_NUM in $EXISTING_PRS; do
            echo "Closing existing sync PR #$PR_NUM"
            gh pr close "$PR_NUM" --comment "新しいスキーマ同期PRに置き換えられました。"
          done
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate references
        if: steps.changes.outputs.changed == 'true'
        run: bun run generate:references

      - name: Update README file counts
        if: steps.changes.outputs.changed == 'true'
        run: |
          REFS_DIR="skills/freee-api-skill/references"
          ACCOUNTING=$(ls "$REFS_DIR"/accounting-*.md 2>/dev/null | wc -l | tr -d ' ')
          HR=$(ls "$REFS_DIR"/hr-*.md 2>/dev/null | wc -l | tr -d ' ')
          INVOICE=$(ls "$REFS_DIR"/invoice-*.md 2>/dev/null | wc -l | tr -d ' ')
          PM=$(ls "$REFS_DIR"/pm-*.md 2>/dev/null | wc -l | tr -d ' ')
          SM=$(ls "$REFS_DIR"/sm-*.md 2>/dev/null | wc -l | tr -d ' ')

          sed -i "s/| 会計     |.*|.*|/| 会計     | 取引、勘定科目、取引先、請求書、経費申請など     | ${ACCOUNTING}         |/" README.md
          sed -i "s/| 人事労務 |.*|.*|/| 人事労務 | 従業員、勤怠、給与明細、年末調整など             | ${HR}         |/" README.md
          sed -i "s/| 請求書   |.*|.*|/| 請求書   | 請求書、見積書、納品書                           | ${INVOICE}          |/" README.md
          sed -i "s/| 工数管理 |.*|.*|/| 工数管理 | プロジェクト、チーム、パートナー、工数、ユーザーなど | ${PM}          |/" README.md
          sed -i "s/| 販売     |.*|.*|/| 販売     | 案件、受注、マスタ                               | ${SM}          |/" README.md

      - name: Create changeset
        if: steps.changes.outputs.changed == 'true'
        run: |
          DIFF_SUMMARY=$(git diff --stat openapi/ | tail -1)
          printf '%s\n' '---' '"freee-mcp": patch' '---' '' "OpenAPIスキーマを最新版に同期 (${DIFF_SUMMARY})" > .changeset/sync-openapi-schemas.md

      - name: Create branch and commit all changes
        if: steps.changes.outputs.changed == 'true'
        id: branch
        run: |
          BRANCH_NAME="chore/sync-openapi-schemas-$(date +%Y%m%d)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Delete remote branch if it exists (re-run on same day)
          git push origin --delete "$BRANCH_NAME" 2>/dev/null || true

          git checkout -b "$BRANCH_NAME"
          git add openapi/ skills/freee-api-skill/references/ .changeset/sync-openapi-schemas.md README.md
          git commit -m "chore: sync OpenAPI schemas and regenerate references"
          git push -u origin "$BRANCH_NAME"
          echo "branch=$BRANCH_NAME" >> "$GITHUB_OUTPUT"

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        run: |
          gh pr create \
            --base main \
            --head "${{ steps.branch.outputs.branch }}" \
            --title "chore: sync OpenAPI schemas" \
            --body "$(cat <<'EOF'
          ## Summary

          OpenAPIスキーマを最新版に自動同期しました。

          ## 変更対象

          - `openapi/` 配下のスキーマファイル
          - `openapi/minimal/` 配下の最小化スキーマファイル
          - `skills/freee-api-skill/references/` 配下のリファレンスファイル（再生成）
          - `README.md` のファイル数テーブル更新
          - `.changeset/` 配下の changeset ファイル

          ---
          This PR was automatically created by the sync-openapi-schemas workflow.
          EOF
          )"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
