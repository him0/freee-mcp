name: Publish

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
      issues: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false

      - name: Setup Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .tool-versions
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build project
        run: bun run build

      - name: Get version
        id: version
        run: |
          VERSION=$(node -e "console.log(require('./package.json').version)")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "üì¶ Version: $VERSION"

      # Phase 1: GitHub Release
      - name: Check if GitHub Release exists
        id: check-release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set +e
          RELEASE_OUTPUT=$(gh release view "v${VERSION}" 2>&1)
          RELEASE_STATUS=$?
          set -e

          if [ "$RELEASE_STATUS" -eq 0 ]; then
            echo "‚ÑπÔ∏è  GitHub Release v${VERSION} already exists - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif echo "$RELEASE_OUTPUT" | grep -Eiq 'not[ -]?found|404'; then
            echo "‚úÖ GitHub Release v${VERSION} does not exist - will create"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "$RELEASE_OUTPUT"
            exit "$RELEASE_STATUS"
          fi

      - name: Configure git for push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Tag
        if: steps.check-release.outputs.skip != 'true'
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          if ! git rev-parse v$VERSION >/dev/null 2>&1; then
            git tag v$VERSION
            git push origin v$VERSION
            echo "‚úÖ Created and pushed tag v$VERSION"
          else
            echo "‚ÑπÔ∏è  Tag v$VERSION already exists"
          fi

      - name: Package skill for release
        if: steps.check-release.outputs.skip != 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "freee-mcp version: ${VERSION}" > skills/freee-api-skill/VERSION.md
          cd skills/freee-api-skill
          zip -r ../../freee-api-skill.zip .
          rm VERSION.md
          echo "‚úÖ Packaged skill with VERSION.md (v${VERSION})"

      - name: Collect contributors from community PRs
        if: steps.check-release.outputs.skip != 'true'
        id: contributors
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ÂâçÂõû„ÅÆ„É™„É™„Éº„Çπ„Çø„Ç∞„ÇíÂèñÂæóÔºàÁèæÂú®„ÅÆ„Çø„Ç∞„ÇíÈô§„ÅèÔºâ
          PREV_TAG=$(git tag --sort=-v:refname | grep '^v' | sed -n '2p')

          CONTRIBUTORS=""
          if [ -n "$PREV_TAG" ]; then
            PREV_DATE=$(git log -1 --format=%aI "$PREV_TAG")
            echo "Previous tag: $PREV_TAG ($PREV_DATE)"

            # ÂâçÂõû„É™„É™„Éº„Çπ‰ª•Èôç„Å´ close „Åï„Çå„Åü from-pr issue „ÇíÊ§úÁ¥¢
            USERS=$(gh issue list \
              --label "from-pr" \
              --state closed \
              --search "closed:>=$PREV_DATE" \
              --json body \
              --jq '.[].body' \
            | { grep -oP 'by @\K[^\s)+]+' || true; } \
            | sort -u)

            if [ -n "$USERS" ]; then
              CONTRIBUTORS=$(echo "$USERS" | while read -r user; do
                echo "- @${user}"
              done)
              echo "Found contributors: $USERS"
            fi
          else
            echo "No previous tag found, skipping contributor collection"
          fi

          {
            echo "list<<EOF"
            echo "$CONTRIBUTORS"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: steps.check-release.outputs.skip != 'true'
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: v${{ steps.version.outputs.version }}
          body: |
            ## What's Changed

            See [CHANGELOG.md](./CHANGELOG.md) for details.
            ${{ steps.contributors.outputs.list != '' && format('\n## Contributors\n\nThank you to the following contributors for their suggestions!\n\n{0}\n', steps.contributors.outputs.list) || '' }}
            ## Package
            - npm: https://www.npmjs.com/package/freee-mcp/v/${{ steps.version.outputs.version }}

          files: freee-api-skill.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Phase 2: npm publish
      - name: Check if npm package exists
        id: check-npm
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set +e
          NPM_OUTPUT=$(npm view "freee-mcp@${VERSION}" version 2>&1)
          NPM_STATUS=$?
          set -e

          if [ "$NPM_STATUS" -eq 0 ]; then
            echo "‚ÑπÔ∏è  npm package freee-mcp@${VERSION} already exists - skipping"
            echo "skip=true" >> $GITHUB_OUTPUT
          elif echo "$NPM_OUTPUT" | grep -Eiq 'E404|404|not[ -]?found'; then
            echo "‚úÖ npm package freee-mcp@${VERSION} does not exist - will publish"
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "$NPM_OUTPUT"
            exit "$NPM_STATUS"
          fi

      - name: Publish to npm (Trusted Publishing)
        if: steps.check-npm.outputs.skip != 'true'
        run: bun run release
        env:
          NPM_CONFIG_PROVENANCE: true
